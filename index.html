<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Max Suika</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  :root{
    --bg:#0d1b12;
    --panel:#13261a;
    --rim:#3ddc6e;
    --rim-dark:#1f7a3f;
    --cream:#f4efd9;
    --danger:#ff5a52;
    --ink:#e9f7ec;
    --muted:#7fae8c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(150% 95% at 50% 6%, rgba(255,250,236,.55) 0%, transparent 55%),
      repeating-linear-gradient(90deg, rgba(190,138,78,.07) 0 40px, transparent 40px 80px),
      repeating-linear-gradient(0deg, rgba(190,138,78,.07) 0 40px, transparent 40px 80px),
      repeating-linear-gradient(180deg, rgba(150,100,55,.045) 0 2px, transparent 2px 64px),
      linear-gradient(180deg, #f6e8ce 0%, #efddbd 42%, #e8d0a7 60%, #e1c595 100%);
    background-attachment:fixed;
    color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    min-height:100%;padding:14px 12px 28px;
    user-select:none;-webkit-user-select:none;overflow-x:hidden;
  }
  .wrap{width:100%;max-width:420px;}
  .title{
    display:flex;align-items:baseline;justify-content:center;gap:8px;margin:0 0 10px;
  }
  .title .max{font-weight:900;font-size:28px;color:var(--danger);text-shadow:0 2px 0 #7a1c18;}
  .title .name{
    font-weight:900;font-size:28px;letter-spacing:-.01em;
    background:linear-gradient(180deg,#34c46a,#1c7e3e);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 1px 0 #ffffff66;
  }

  /* 暖色のツヤパネル（本家風） */
  .panel{
    position:relative;border-radius:22px;padding:10px 18px;line-height:1;
    background:linear-gradient(180deg, rgba(255,252,242,.97), rgba(246,231,200,.97));
    border:1px solid #e7cf9f;
    box-shadow:inset 0 2px 0 #fffaf0, inset 0 -4px 10px #d9b97a55, 0 8px 18px -10px #9a7b3f99;
  }
  .panel::after{
    content:'';position:absolute;left:14%;top:9%;width:52%;height:30%;border-radius:50%;
    background:radial-gradient(closest-side, rgba(255,255,255,.75), transparent);
    pointer-events:none;
  }
  .panel .label{font-size:12px;font-weight:800;letter-spacing:.16em;color:#b07d3a;}

  .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .score-panel{text-align:left;}
  .score-panel .val{
    font-size:40px;font-weight:900;font-variant-numeric:tabular-nums;margin-top:2px;
    background:linear-gradient(180deg,#ffcf5e,#e8932a);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 0 #fff7e6;
  }
  .score-panel .best{font-size:11px;font-weight:700;letter-spacing:.06em;color:#a98a55;margin-top:4px;font-variant-numeric:tabular-nums;}
  .next-panel{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:86px;}
  .next-panel .dot{
    width:48px;height:48px;border-radius:50%;display:grid;place-items:center;
    font-size:27px;box-shadow:inset 0 -4px 8px #0002, 0 3px 6px #0003;
  }

  .stage{
    position:relative;width:100%;border-radius:18px;overflow:hidden;
    background:linear-gradient(180deg,#16301f,#0e2114);
    border:1px solid #1d3d28;
    box-shadow:inset 0 1px 0 #2c5a3a, 0 18px 40px -20px #000;
  }
  canvas{display:block;width:100%;touch-action:none;cursor:pointer;}

  .bottombar{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-top:12px;}
  .wheel-panel{
    position:relative;border-radius:22px;padding:8px 14px 12px;
    background:linear-gradient(180deg, rgba(255,252,242,.97), rgba(246,231,200,.97));
    border:1px solid #e7cf9f;
    box-shadow:inset 0 2px 0 #fffaf0, 0 8px 18px -10px #9a7b3f99;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .wheel-panel .label{font-size:12px;font-weight:800;letter-spacing:.12em;color:#b07d3a;}
  .wheel{position:relative;width:150px;height:150px;}
  .wheel::before{
    content:'';position:absolute;inset:6px;border-radius:50%;
    background:radial-gradient(closest-side, transparent 50%, rgba(120,200,90,.32) 55%, rgba(80,170,70,.18) 84%, transparent 100%);
  }
  .wheel-item{
    position:absolute;transform:translate(-50%,-50%);border-radius:50%;
    display:grid;place-items:center;line-height:1;
    box-shadow:inset 0 -2px 4px #0002, 0 2px 4px #0003;
  }
  .reset{
    background:linear-gradient(180deg,#fffdf8,#f0dcb4);color:#8a5a22;
    border:1px solid #e7cf9f;border-radius:999px;padding:8px 18px;
    font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.04em;
    box-shadow:0 4px 10px -4px #9a7b3f99;
  }
  .reset:active{transform:scale(.96);}

  .overlay{
    position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;
    background:#08130bdd;backdrop-filter:blur(3px);z-index:5;text-align:center;
  }
  .overlay.show{display:flex;}
  .overlay h2{margin:0;font-size:40px;font-weight:900;color:var(--danger);letter-spacing:.02em;}
  .overlay p{margin:0;color:var(--ink);font-size:15px;}
  .overlay .big{font-size:34px;font-weight:900;}
  .overlay button{
    margin-top:6px;background:linear-gradient(180deg,#7dffb0,#19a64e);
    color:#06160c;border:none;border-radius:999px;padding:13px 30px;
    font-size:16px;font-weight:900;cursor:pointer;letter-spacing:.06em;
    box-shadow:0 8px 20px -8px #19a64e;
  }
  .overlay button:active{transform:scale(.96);}
  .hint{margin-top:12px;text-align:center;font-size:11px;color:#a07d44;letter-spacing:.04em;}

  /* スタート画面（デバイス選択） */
  .start{
    position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    padding:24px;
    background:
      radial-gradient(150% 95% at 50% 6%, rgba(255,250,236,.6) 0%, transparent 55%),
      linear-gradient(180deg,#f6e8ce 0%,#efddbd 45%,#e1c595 100%);
  }
  .start.hide{display:none;}
  .start-card{
    width:100%;max-width:360px;text-align:center;border-radius:28px;padding:32px 26px;
    background:linear-gradient(180deg, rgba(255,252,242,.97), rgba(246,231,200,.97));
    border:1px solid #e7cf9f;
    box-shadow:inset 0 2px 0 #fffaf0, 0 22px 50px -20px #9a7b3f;
  }
  .start-title{display:flex;gap:8px;justify-content:center;align-items:baseline;margin-bottom:4px;}
  .start-title .max{font-weight:900;font-size:36px;color:var(--danger);text-shadow:0 2px 0 #7a1c18;}
  .start-title .name{
    font-weight:900;font-size:36px;
    background:linear-gradient(180deg,#34c46a,#1c7e3e);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .start-sub{margin:8px 0 24px;color:#a07d44;font-size:14px;font-weight:700;}
  .start-btns{display:flex;gap:14px;justify-content:center;}
  .dev{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;
    background:linear-gradient(180deg,#fffdf8,#f0dcb4);border:1px solid #e7cf9f;
    border-radius:20px;padding:22px 10px;font-size:38px;cursor:pointer;color:#8a5a22;
    box-shadow:0 6px 14px -6px #9a7b3f99;
  }
  .dev span{font-size:15px;font-weight:800;letter-spacing:.04em;}
  .dev:active{transform:scale(.96);}

  /* スマホ向けにコンパクト化（縦に収める） */
  .mode-mobile .title{margin-bottom:6px;}
  .mode-mobile .title .max,.mode-mobile .title .name{font-size:23px;}
  .mode-mobile .panel{padding:7px 13px;border-radius:18px;}
  .mode-mobile .panel .label{font-size:11px;}
  .mode-mobile .score-panel .val{font-size:31px;}
  .mode-mobile .next-panel{min-width:74px;}
  .mode-mobile .next-panel .dot{width:40px;height:40px;font-size:23px;}
  .mode-mobile .topbar{margin-bottom:8px;}
  .mode-mobile .bottombar{margin-top:8px;}
  .mode-mobile .wheel-panel{padding:6px 10px 8px;}
  .mode-mobile .wheel{transform:scale(.74);margin:-19px -8px;}
  .mode-mobile .hint{margin-top:8px;font-size:10px;}
</style>
</head>
<body>
<div class="start" id="start">
  <div class="start-card">
    <div class="start-title"><span class="max">MAX</span><span class="name">Suika</span></div>
    <p class="start-sub">Choose your device</p>
    <div class="start-btns">
      <button class="dev" data-mode="mobile">📱<span>Phone</span></button>
      <button class="dev" data-mode="pc">💻<span>PC</span></button>
    </div>
  </div>
</div>
<div class="wrap">
  <div class="title">
    <span class="max">MAX</span><span class="name">Suika</span>
  </div>

  <div class="topbar">
    <div class="panel score-panel">
      <div class="label">SCORE</div>
      <div class="val" id="score">0</div>
      <div class="best">BEST SCORE <span id="best">0</span></div>
    </div>
    <div class="panel next-panel">
      <div class="label">NEXT</div>
      <span class="dot" id="nextDot"></span>
    </div>
  </div>

  <div class="stage" id="stage">
    <canvas id="board"></canvas>
    <div class="overlay" id="overlay">
      <h2>GAME OVER</h2>
      <p>Score <span class="big" id="finalScore">0</span></p>
      <button id="again">Play Again</button>
    </div>
  </div>

  <div class="bottombar">
    <button class="reset" id="reset">Reset</button>
    <div class="wheel-panel">
      <div class="label">EVOLUTION</div>
      <div class="wheel" id="wheel"></div>
    </div>
  </div>
  <div class="hint" id="hint">Tap / click to drop a fruit • matching fruits merge</div>
</div>

<script>
const { Engine, Render, Runner, World, Bodies, Body, Events, Composite } = Matter;

// ---- フルーツ定義（小さい順に合体していく） ----
const FRUITS = [
  { name:"Cherry",     r:16,  color:"#e8455b", emoji:"🍒", score:1 },
  { name:"Strawberry", r:23,  color:"#f06292", emoji:"🍓", score:3 },
  { name:"Grape",      r:31,  color:"#9b6cd6", emoji:"🍇", score:6 },
  { name:"Dekopon",    r:39,  color:"#f9a825", emoji:"🍊", score:10 },
  { name:"Persimmon",  r:48,  color:"#fb8c00", emoji:"🟠", score:15 },
  { name:"Apple",      r:58,  color:"#ef5350", emoji:"🍎", score:21 },
  { name:"Pear",       r:68,  color:"#cddc39", emoji:"🍐", score:28 },
  { name:"Peach",      r:79,  color:"#ffab91", emoji:"🍑", score:36 },
  { name:"Pineapple",  r:92,  color:"#fdd835", emoji:"🍍", score:45 },
  { name:"Melon",      r:106, color:"#aed581", emoji:"🍈", score:55 },
  { name:"Watermelon", r:122, color:"#43a047", emoji:"🍉", score:66 },
];
const MAX_DROP_INDEX = 4; // ドロップで出るのは index 0〜4 まで

// ---- 盤面サイズ ----
const W = 400, H = 560;
const WALL = 14;          // 壁の厚み
const DROP_LINE = 92;     // この高さより上に居続けるとゲームオーバー
const GAME_OVER_GRACE = 75; // フレーム数の猶予

const stage = document.getElementById('stage');
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const wrap = document.querySelector('.wrap');

let mode = 'pc';       // 'mobile' | 'pc'
let started = false;   // スタート画面で選択するまで false

// 画面に収まるようキャンバスサイズを計算（高解像度対応）
function fitCanvas(){
  const ratio = H / W;                       // 縦横比 1.4
  const pad = 24;                            // body の左右余白
  let maxW = Math.min(window.innerWidth - pad, mode==='pc' ? 440 : 480);
  // 上下のUIぶんを引いて、縦に収まる幅を求める
  const reserve = mode==='pc' ? 250 : 290;
  const availH = window.innerHeight - reserve;
  let targetW = maxW;
  if(availH > 180) targetW = Math.min(maxW, availH / ratio);
  targetW = Math.max(200, Math.round(targetW));

  wrap.style.maxWidth = targetW + 'px';      // パネルも一緒に揃える
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.style.height = (targetW * ratio) + 'px';
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

const engine = Engine.create();
engine.gravity.y = 1.1;
const world = engine.world;

// 壁
function buildWalls(){
  const opt = { isStatic:true, render:{visible:false}, friction:0.3 };
  World.add(world, [
    Bodies.rectangle(W/2, H+WALL/2, W, WALL*2, opt),                 // 床
    Bodies.rectangle(-WALL/2, H/2, WALL*2, H*2, opt),                // 左
    Bodies.rectangle(W+WALL/2, H/2, WALL*2, H*2, opt),               // 右
  ]);
}
buildWalls();

// ---- 状態 ----
let score = 0;
let best = 0;
try { best = parseInt(window.__suikaBest || '0') || 0; } catch(e){}
let currentIndex = randDropIndex();
let nextIndex = randDropIndex();
let pendingDrop = false;    // 落とせる状態か（スタート後にtrue）
let dropX = W/2;
let gameOver = false;
let popAnims = [];          // 合体エフェクト
let overflowTimer = 0;

function randDropIndex(){ return Math.floor(Math.random()*(MAX_DROP_INDEX+1)); }

function addFruit(index, x, y, opts={}){
  const f = FRUITS[index];
  const body = Bodies.circle(x, y, f.r, {
    restitution: 0.18,
    friction: 0.4,
    frictionStatic: 0.6,
    density: 0.0011,
    render:{visible:false},
    ...opts
  });
  body.fruitIndex = index;
  body.merging = false;
  body.bornAt = performance.now();
  World.add(world, body);
  return body;
}

// ---- 合体処理 ----
Events.on(engine, 'collisionStart', (ev)=>{
  for(const pair of ev.pairs){
    const a = pair.bodyA, b = pair.bodyB;
    if(a.fruitIndex===undefined || b.fruitIndex===undefined) continue;
    if(a.fruitIndex !== b.fruitIndex) continue;
    if(a.merging || b.merging) continue;
    if(a.fruitIndex >= FRUITS.length-1){ // すいか同士は消すだけ
      a.merging=b.merging=true;
      const mx=(a.position.x+b.position.x)/2, my=(a.position.y+b.position.y)/2;
      World.remove(world,a); World.remove(world,b);
      addScore(FRUITS[FRUITS.length-1].score*2);
      popAnims.push({x:mx,y:my,r:FRUITS[a.fruitIndex].r,color:FRUITS[a.fruitIndex].color,t:0});
      continue;
    }
    a.merging=b.merging=true;
    const ni = a.fruitIndex+1;
    const mx=(a.position.x+b.position.x)/2, my=(a.position.y+b.position.y)/2;
    World.remove(world,a); World.remove(world,b);
    const nb = addFruit(ni, mx, my);
    // 合体時に少し弾ませる
    Body.setVelocity(nb, {x:0, y:-1.2});
    addScore(FRUITS[ni].score);
    popAnims.push({x:mx,y:my,r:FRUITS[ni].r,color:FRUITS[ni].color,t:0});
  }
});

function addScore(v){
  score += v;
  document.getElementById('score').textContent = score;
  if(score>best){ best=score; window.__suikaBest=String(best);
    document.getElementById('best').textContent = best; }
}

// ---- 入力 ----
function pointerX(e){
  const rect = canvas.getBoundingClientRect();
  const clientX = (e.touches? e.touches[0].clientX : e.clientX);
  let x = (clientX - rect.left) / rect.width * W;
  const r = FRUITS[currentIndex].r;
  return Math.max(WALL+r, Math.min(W-WALL-r, x));
}
function onMove(e){ if(!started || gameOver) return; dropX = pointerX(e); }
function onDrop(e){
  if(!started || gameOver || !pendingDrop) return;
  dropX = pointerX(e);
  const idx = currentIndex;
  addFruit(idx, dropX, DROP_LINE-10);
  pendingDrop = false;
  currentIndex = nextIndex;
  nextIndex = randDropIndex();
  updateNext();
  setTimeout(()=>{ if(!gameOver) pendingDrop=true; }, 380); // 連投防止
}
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mousedown', e=>{ onMove(e); });
canvas.addEventListener('mouseup', onDrop);
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); onMove(e); }, {passive:false});
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); onMove(e); }, {passive:false});
canvas.addEventListener('touchend', e=>{ e.preventDefault(); onDrop(e); }, {passive:false});

function updateNext(){
  const f = FRUITS[nextIndex];
  const dot = document.getElementById('nextDot');
  dot.style.background = f.color;
  dot.textContent = f.emoji;
}

// ---- 進化の輪（合体順を円状に表示） ----
function buildWheel(){
  const wheel = document.getElementById('wheel');
  if(!wheel) return;
  wheel.innerHTML='';
  const n = FRUITS.length, R = 58, C = 75;
  FRUITS.forEach((f,i)=>{
    const ang = (i/n)*Math.PI*2 - Math.PI/2; // 上から時計回り
    const x = Math.cos(ang)*R, y = Math.sin(ang)*R;
    const size = 15 + i*1.7;
    const el = document.createElement('div');
    el.className = 'wheel-item';
    el.style.width = el.style.height = size+'px';
    el.style.left = (C + x)+'px';
    el.style.top  = (C + y)+'px';
    el.style.background = f.color;
    el.style.fontSize = (size*0.6)+'px';
    el.textContent = f.emoji;
    el.title = f.name;
    wheel.appendChild(el);
  });
}

// ---- 描画 ----
function drawFruit(x,y,index,angle){
  const f = FRUITS[index];
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angle||0);
  // 本体
  const g = ctx.createRadialGradient(-f.r*0.3,-f.r*0.35,f.r*0.1, 0,0,f.r);
  g.addColorStop(0, lighten(f.color,28));
  g.addColorStop(1, f.color);
  ctx.beginPath(); ctx.arc(0,0,f.r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  // ふち
  ctx.lineWidth=Math.max(1.5,f.r*0.04);
  ctx.strokeStyle=darken(f.color,18); ctx.stroke();
  // ハイライト
  ctx.beginPath();
  ctx.ellipse(-f.r*0.32,-f.r*0.38,f.r*0.28,f.r*0.18,-0.5,0,Math.PI*2);
  ctx.fillStyle="rgba(255,255,255,.45)"; ctx.fill();
  // 絵文字
  ctx.font = (f.r*1.05)+"px serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(f.emoji, 0, f.r*0.06);
  ctx.restore();
}
function lighten(hex,amt){ return shade(hex,amt); }
function darken(hex,amt){ return shade(hex,-amt); }
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)+amt, g=((n>>8)&255)+amt, b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function render(){
  ctx.clearRect(0,0,W,H);

  // ドロップライン
  ctx.save();
  ctx.setLineDash([6,8]);
  ctx.strokeStyle="rgba(255,90,82,.45)";
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(WALL,DROP_LINE); ctx.lineTo(W-WALL,DROP_LINE); ctx.stroke();
  ctx.restore();

  // 落下予告（ガイド線＋待機フルーツ）
  if(pendingDrop && !gameOver){
    const r = FRUITS[currentIndex].r;
    ctx.save();
    ctx.strokeStyle="rgba(255,255,255,.12)";
    ctx.lineWidth=2; ctx.setLineDash([3,7]);
    ctx.beginPath(); ctx.moveTo(dropX,DROP_LINE); ctx.lineTo(dropX,H-WALL); ctx.stroke();
    ctx.restore();
    drawFruit(dropX, DROP_LINE-10, currentIndex, 0);
  }

  // フルーツ本体
  const bodies = Composite.allBodies(world);
  for(const b of bodies){
    if(b.fruitIndex===undefined) continue;
    drawFruit(b.position.x, b.position.y, b.fruitIndex, b.angle);
  }

  // 合体エフェクト
  popAnims = popAnims.filter(p=>p.t<1);
  for(const p of popAnims){
    p.t += 0.08;
    ctx.save();
    ctx.globalAlpha = (1-p.t)*0.6;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*(1+p.t*0.6),0,Math.PI*2);
    ctx.strokeStyle=p.color; ctx.lineWidth=4; ctx.stroke();
    ctx.restore();
  }
}

// ---- ゲームオーバー判定 ----
function checkGameOver(){
  if(gameOver) return;
  let over=false;
  const bodies = Composite.allBodies(world);
  for(const b of bodies){
    if(b.fruitIndex===undefined) continue;
    if(performance.now()-b.bornAt < 700) continue; // 投入直後は除外
    const top = b.position.y - FRUITS[b.fruitIndex].r;
    const slow = Math.abs(b.velocity.y) < 0.6;
    if(top < DROP_LINE && slow){ over=true; break; }
  }
  if(over){ overflowTimer++; if(overflowTimer>GAME_OVER_GRACE) endGame(); }
  else overflowTimer = Math.max(0, overflowTimer-2);
}

function endGame(){
  gameOver = true; pendingDrop=false;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('overlay').classList.add('show');
}

function reset(){
  const bodies = Composite.allBodies(world);
  for(const b of bodies){ if(b.fruitIndex!==undefined) World.remove(world,b); }
  score=0; document.getElementById('score').textContent='0';
  gameOver=false; pendingDrop=true; overflowTimer=0; popAnims=[];
  currentIndex=randDropIndex(); nextIndex=randDropIndex();
  updateNext();
  document.getElementById('overlay').classList.remove('show');
}
document.getElementById('again').addEventListener('click', reset);
document.getElementById('reset').addEventListener('click', reset);

// ---- デバイス選択 ----
function chooseDevice(m){
  mode = m;
  document.body.classList.add(m==='mobile' ? 'mode-mobile' : 'mode-pc');
  document.getElementById('hint').textContent =
    (m==='mobile')
      ? 'Slide your finger to aim, release to drop • matching fruits merge'
      : 'Move with the mouse → click to drop • matching fruits merge';
  document.getElementById('start').classList.add('hide');
  started = true;
  pendingDrop = true;
  fitCanvas();
}
document.querySelectorAll('.dev').forEach(btn=>{
  btn.addEventListener('click', ()=> chooseDevice(btn.dataset.mode));
});

// ---- ループ ----
const runner = Runner.create();
Runner.run(runner, engine);
function loop(){ checkGameOver(); render(); requestAnimationFrame(loop); }

window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', ()=> setTimeout(fitCanvas, 200));
fitCanvas();
updateNext();
buildWheel();
document.getElementById('best').textContent = best;
loop();
</script>
